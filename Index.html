<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Clicker Quest</title>
    <style>
        /* ==========================================================================
           THEME DEFINITIONS (Variables used to change styles instantly)
           ========================================================================== */
        :root {
            --bg-gradient: radial-gradient(circle, #1a2a3a 0%, #0d1520 100%);
            --panel-text: #4d2600;
        }

        [data-theme="dark"] {
            --bg-gradient: radial-gradient(circle, #2c3e50 0%, #0f171e 100%);
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

        [data-theme="light"] {
            --bg-gradient: radial-gradient(circle, #ffffff 0%, #e2e8f0 100%);
        }

        /* ==========================================================================
           BASE LAYOUT & ANIMATION
           ========================================================================== */
        body {
            font-family: 'Arial Rounded MT Bold', 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.3s ease;
        }

        /* Cartoony Golden Menu Box */
        .game-container {
            background: linear-gradient(180deg, #ffd700 0%, #e6a100 100%);
            padding: 25px;
            border-radius: 24px;
            border: 6px solid #664600;
            box-shadow: 
                0 12px 0 #996900, 
                0 20px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 360px;
            position: relative;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* DYNAMIC THEME OVERRIDES ON THE MAIN WINDOW */
        [data-theme="dark"] .game-container {
            background: linear-gradient(180deg, #4f5d75 0%, #2d3142 100%);
            border-color: #1f2421;
            box-shadow: 0 12px 0 #11151c, 0 20px 30px rgba(0, 0, 0, 0.7);
        }
        [data-theme="dark"] h3, [data-theme="dark"] .stats, [data-theme="dark"] .theme-prompt, [data-theme="dark"] .account-info {
            color: #ffffff !important;
        }

        [data-theme="light"] .game-container {
            background: linear-gradient(180deg, #ffffff 0%, #dbe2ef 100%);
            border-color: #3f72af;
            box-shadow: 0 12px 0 #112d4e, 0 20px 30px rgba(0, 0, 0, 0.2);
        }
        [data-theme="light"] h3, [data-theme="light"] .stats, [data-theme="light"] .theme-prompt, [data-theme="light"] .account-info {
            color: #112d4e !important;
        }

        /* Golden Header Banner */
        .header-banner {
            background: linear-gradient(180deg, #ff9900 0%, #cc6600 100%);
            border: 4px solid #4d2600;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.4);
        }
        [data-theme="dark"] .header-banner {
            background: linear-gradient(180deg, #ef8354 0%, #bfc0c0 100%);
            border-color: #1f2421;
        }
        [data-theme="light"] .header-banner {
            background: linear-gradient(180deg, #3f72af 0%, #112d4e 100%);
            border-color: #112d4e;
        }

        h1 {
            color: #ffffff;
            margin: 0;
            font-size: 26px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #4d2600;
            letter-spacing: 1px;
        }
        [data-theme="dark"] h1 { text-shadow: 2px 2px 0px #1f2421; }
        [data-theme="light"] h1 { text-shadow: 2px 2px 0px #112d4e; }

        /* Views (Frames Hierarchy) */
        .view {
            display: none;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            flex-grow: 1;
        }
        .view.active { display: flex; }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        /* ==========================================================================
           BUTTON & INPUT ARCHITECTURE
           ========================================================================== */
        .btn-3d {
            background: linear-gradient(180deg, #fff2a3 0%, #ffa200 50%, #cc6600 100%);
            color: #4d2600;
            border: 5px solid #4d2600;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: 900;
            border-radius: 40px;
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
            box-shadow: 0 5px 0 #663300, 0 8px 12px rgba(0,0,0,0.3);
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .btn-3d:hover { background: linear-gradient(180deg, #fff5b8 0%, #ffb31a 50%, #e67300 100%); }
        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #663300, 0 3px 5px rgba(0,0,0,0.3);
        }

        /* Variations */
        .click-btn { padding: 22px 40px; font-size: 24px; margin-bottom: 10px; }
        
        .settings-btn {
            background: linear-gradient(180deg, #a3d5ff 0%, #2a82e6 50%, #154b8a 100%);
            color: white; border-color: #0f2d52;
            box-shadow: 0 5px 0 #0f2d52, 0 8px 12px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px #0f2d52;
        }
        .settings-btn:hover { background: linear-gradient(180deg, #b8e0ff 0%, #4293f5 50%, #1c5ba6 100%); }
        .settings-btn:active { box-shadow: 0 1px 0 #0f2d52, 0 3px 5px rgba(0,0,0,0.3); }

        .theme-frame-btn {
            background: linear-gradient(180deg, #e0a3ff 0%, #aa2ae6 50%, #63158a 100%);
            color: white; border-color: #3d0f52;
            box-shadow: 0 5px 0 #3d0f52, 0 8px 12px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px #3d0f52;
        }
        .theme-frame-btn:hover { background: linear-gradient(180deg, #edb8ff 0%, #be42f5 50%, #7d1ca6 100%); }
        .theme-frame-btn:active { box-shadow: 0 1px 0 #3d0f52, 0 3px 5px rgba(0,0,0,0.3); }

        .account-frame-btn {
            background: linear-gradient(180deg, #ffc4a3 0%, #e6672a 50%, #8a3515 100%);
            color: white; border-color: #521a0f;
            box-shadow: 0 5px 0 #521a0f, 0 8px 12px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px #521a0f;
        }
        .account-frame-btn:hover { background: linear-gradient(180deg, #ffd4b8 0%, #f57a42 50%, #a6431c 100%); }
        .account-frame-btn:active { box-shadow: 0 1px 0 #521a0f, 0 3px 5px rgba(0,0,0,0.3); }

        .opt-auto { background: linear-gradient(180deg, #c4cbd4 0%, #788494 50%, #404954 100%); color: white; border-color: #222; box-shadow: 0 4px 0 #222; text-shadow: 1px 1px 1px #000;}
        .opt-dark { background: linear-gradient(180deg, #555 0%, #222 50%, #000 100%); color: #ffcc00; border-color: #111; box-shadow: 0 4px 0 #000; text-shadow: none;}
        .opt-light { background: linear-gradient(180deg, #fff 0%, #e0e0e0 50%, #bbb 100%); color: #333; border-color: #999; box-shadow: 0 4px 0 #777; text-shadow: none;}

        /* Form Layout Elements */
        .form-group {
            margin-bottom: 10px;
            text-align: left;
        }
        .form-label {
            font-size: 11px;
            font-weight: bold;
            color: #4d2600;
            text-transform: uppercase;
            margin-bottom: 3px;
            display: block;
        }
        [data-theme="dark"] .form-label { color: #fff; }

        .account-input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 3px solid #4d2600;
            border-radius: 10px;
            box-sizing: border-box;
            font-weight: bold;
            background-color: #fff;
            color: #333;
            user-select: text;
            -webkit-user-select: text;
        }
        .account-input:focus { outline: none; border-color: #ff9900; }

        /* Row structure for Password input alignment alongside control buttons */
        .password-row {
            display: flex;
            gap: 6px;
        }
        .btn-control {
            padding: 0 10px;
            font-size: 11px;
            border-radius: 10px;
            white-space: nowrap;
            box-shadow: 0 3px 0 #663300;
            border-width: 3px;
        }
        .btn-toggle-view {
            background: linear-gradient(180deg, #a3d5ff 0%, #2a82e6 50%, #154b8a 100%);
            border-color: #0f2d52;
            box-shadow: 0 3px 0 #0f2d52;
            color: white;
        }
        .btn-toggle-view:hover { background: linear-gradient(180deg, #b8e0ff 0%, #4293f5 50%, #1c5ba6 100%); }
        .btn-toggle-view:active { box-shadow: 0 1px 0 #0f2d52; }

        /* Score Panel Display */
        .score-display {
            background-color: #223344;
            border: 4px solid #664600;
            border-radius: 14px;
            padding: 12px;
            font-size: 26px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.6);
        }
        [data-theme="dark"] .score-display { border-color: #1f2421; color: #ef8354; }
        [data-theme="light"] .score-display { border-color: #112d4e; color: #3f72af; background-color: #f9f7f7; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); text-shadow: none;}

        /* Upgrades Module */
        .upgrades-section { margin-top: 15px; border-top: 4px dashed #996900; padding-top: 10px; }
        [data-theme="dark"] .upgrades-section { border-top-color: #bfc0c0; }
        [data-theme="light"] .upgrades-section { border-top-color: #3f72af; }
        .upgrades-section h3 { color: var(--panel-text); margin: 5px 0 10px 0; font-size: 16px; text-transform: uppercase; }

        .upgrade-btn {
            background: linear-gradient(180deg, #ffcc00 0%, #b37400 100%);
            color: #ffffff; border: 3px solid #4d2600; padding: 10px 15px; font-size: 13px; font-weight: bold; border-radius: 12px;
            cursor: pointer; width: 100%; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            text-shadow: 1px 1px 2px #4d2600; box-shadow: 0 4px 0 #4d2600; transition: transform 0.05s, box-shadow 0.05s;
        }
        .upgrade-btn:hover:not(:disabled) { background: linear-gradient(180deg, #ffd633 0%, #cc8400 100%); }
        .upgrade-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 1px 0 #4d2600; }
        .upgrade-btn:disabled {
            background: linear-gradient(180deg, #998c73 0%, #595243 100%);
            color: #b3b3b3; border-color: #333; box-shadow: 0 4px 0 #222; cursor: not-allowed; text-shadow: none;
        }
        .cost-tag { background-color: #4d2600; color: #ffd700; padding: 4px 10px; border-radius: 20px; font-size: 11px; border: 1px solid #ffcc00; }

        /* Stats Subpanel */
        .stats {
            background-color: rgba(77, 38, 0, 0.15); border-radius: 12px; padding: 10px; font-size: 13px;
            color: var(--panel-text); font-weight: bold; margin-top: 10px; text-align: left; display: flex; flex-direction: column; gap: 4px;
        }
        [data-theme="light"] .stats { background-color: rgba(63, 114, 175, 0.1); }
        [data-theme="dark"] .stats { background-color: rgba(255, 255, 255, 0.05); }

        /* Account Status Bar on Main Menu */
        .account-info {
            font-size: 12px;
            color: var(--panel-text);
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Settings Overlay Modal Structure */
        .modal-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7); border-radius: 18px; justify-content: center; align-items: center; z-index: 10;
        }
        .modal-overlay.active { display: flex; }

        .settings-card {
            background: linear-gradient(180deg, #ffffff 0%, #e6e6e6 100%); border: 5px solid #4d2600; border-radius: 16px;
            padding: 20px; width: 85%; box-shadow: 0 10px 20px rgba(0,0,0,0.5); box-sizing: border-box;
        }
        [data-theme="dark"] .settings-card { background: linear-gradient(180deg, #2b2d42 0%, #1a1b29 100%); border-color: #000; color: white;}
        [data-theme="light"] .settings-card { background: linear-gradient(180deg, #f9f7f7 0%, #dbe2ef 100%); border-color: #112d4e; }
        .settings-card h2 { margin-top: 0; color: #4d2600; font-size: 22px; text-transform: uppercase; }
        [data-theme="dark"] .settings-card h2 { color: #fff; }
        [data-theme="light"] .settings-card h2 { color: #112d4e; }

        .danger-btn {
            background: linear-gradient(180deg, #ff6b6b 0%, #c92a2a 100%); color: white;
            border-color: #5c0e0e; box-shadow: 0 4px 0 #5c0e0e; text-shadow: 1px 1px 2px #5c0e0e; width: 100%; margin-bottom: 12px;
        }
        .danger-btn:hover { background: linear-gradient(180deg, #ff8787 0%, #e03131 100%); }
        .danger-btn:active { box-shadow: 0 1px 0 #5c0e0e; }

        .theme-prompt { color: #4d2600; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="modal-overlay" id="settings-modal">
            <div class="settings-card">
                <h2>Settings</h2>
                <hr style="border: 2px dashed #4d2600; margin-bottom: 15px; opacity: 0.5;">
                <button class="btn-3d account-frame-btn" id="go-account-view-btn" style="width: 100%; margin-bottom: 12px;">👤 Account Manager</button>
                <button class="btn-3d theme-frame-btn" id="go-theme-view-btn" style="width: 100%; margin-bottom: 12px;">🎨 Change Theme</button>
                <button class="btn-3d danger-btn" id="reset-btn">Reset Account Data</button>
                <button class="btn-3d" id="close-settings-btn" style="width: 100%;">Close</button>
            </div>
        </div>

        <div class="header-banner">
            <h1 id="game-title">Gold Quest</h1>
        </div>
        
        <div class="view active" id="menu-view">
            <div class="account-info">Active Account: <span id="menu-account-display">Guest</span></div>
            <div class="menu-buttons">
                <button class="btn-3d" id="play-btn">▶ Play Game</button>
                <button class="btn-3d settings-btn" id="open-settings-btn">⚙ Settings</button>
            </div>
        </div>

        <div class="view" id="game-view">
            <div class="score-display">✨ <span id="score">0</span> Gold</div>
            
            <button class="btn-3d click-btn" id="click-me-btn">TAP HERE!</button>

            <div class="upgrades-section">
                <h3>Shop Upgrades</h3>
                
                <button class="upgrade-btn" id="upgrade-click">
                    <span>⚡ Power Click (+1)</span>
                    <span class="cost-tag" id="click-cost">10 Gold</span>
                </button>

                <button class="upgrade-btn" id="upgrade-auto">
                    <span>🤖 Auto-Miner (+1/s)</span>
                    <span class="cost-tag" id="auto-cost">50 Gold</span>
                </button>
            </div>

            <div class="stats">
                <div>▸ Gold Per Tap: <span id="click-power">1</span></div>
                <div>▸ Gold Per Second: <span id="auto-power">0</span></div>
            </div>
            
            <button class="btn-3d settings-btn" id="back-to-menu-btn" style="margin-top:15px; padding: 8px; font-size:14px; box-shadow: 0 4px 0 #0f2d52;">↩ Main Menu</button>
        </div>

        <div class="view" id="theme-view">
            <div class="theme-prompt">Pick a window appearance mode:</div>
            <div class="menu-buttons" style="margin-top: 0;">
                <button class="btn-3d opt-auto" id="theme-auto-btn">Auto Mode</button>
                <button class="btn-3d opt-dark" id="theme-dark-btn">Dark Mode</button>
                <button class="btn-3d opt-light" id="theme-light-btn">Light Mode</button>
                
                <button class="btn-3d" id="back-to-settings-theme-btn" style="margin-top: 15px; font-size: 15px; padding: 10px; background: #999; color: #fff; border-color: #444; box-shadow: 0 4px 0 #333;">Back to Settings</button>
            </div>
        </div>

        <div class="view" id="account-view">
            <div class="form-group">
                <label class="form-label">Profile Name</label>
                <input type="text" class="account-input" id="account-name-input" placeholder="e.g. Miner123" maxlength="12">
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="account-input" id="account-email-input" placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="password-row">
                    <input type="password" class="account-input" id="account-pass-input" placeholder="Enter password">
                    <button class="btn-3d btn-control btn-toggle-view" id="toggle-pass-btn" type="button">👁️</button>
                    <button class="btn-3d btn-control" id="random-pass-btn" type="button">Random</button>
                </div>
            </div>

            <div id="account-error" style="color:#d63031; font-size:11px; font-weight:bold; margin-top:5px; min-height:15px; text-shadow: none;"></div>
            
            <div class="menu-buttons" style="margin-top: 5px;">
                <button class="btn-3d account-frame-btn" id="save-account-btn">Save & Login</button>
                <button class="btn-3d" id="back-to-settings-acc-btn" style="font-size: 15px; padding: 10px; background: #999; color: #fff; border-color: #444; box-shadow: 0 4px 0 #333;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Default Game Engine Baselines
        let currentAccount = 'Guest';
        let score = 0;
        let clickPower = 1;
        let autoClickers = 0;
        let clickUpgradeCost = 10;
        let autoUpgradeCost = 50;
        let currentThemeSetting = 'auto';

        // UI View Window Modules
        const menuView = document.getElementById('menu-view');
        const gameView = document.getElementById('game-view');
        const themeView = document.getElementById('theme-view');
        const accountView = document.getElementById('account-view');
        const settingsModal = document.getElementById('settings-modal');
        const gameTitle = document.getElementById('game-title');

        // Navigation Components
        const playBtn = document.getElementById('play-btn');
        const openSettingsBtn = document.getElementById('open-settings-btn');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        const goThemeViewBtn = document.getElementById('go-theme-view-btn');
        const goAccountViewBtn = document.getElementById('go-account-view-btn');
        const backToSettingsThemeBtn = document.getElementById('back-to-settings-theme-btn');
        const backToSettingsAccBtn = document.getElementById('back-to-settings-acc-btn');
        const backToMenuBtn = document.getElementById('back-to-menu-btn');
        const resetBtn = document.getElementById('reset-btn');
        const saveAccountBtn = document.getElementById('save-account-btn');
        const randomPassBtn = document.getElementById('random-pass-btn');
        const togglePassBtn = document.getElementById('toggle-pass-btn');
        
        // Input Components
        const accountNameInput = document.getElementById('account-name-input');
        const accountEmailInput = document.getElementById('account-email-input');
        const accountPassInput = document.getElementById('account-pass-input');
        const accountError = document.getElementById('account-error');
        const menuAccountDisplay = document.getElementById('menu-account-display');

        // Gameplay Components
        const clickBtn = document.getElementById('click-me-btn');
        const upgradeClickBtn = document.getElementById('upgrade-click');
        const upgradeAutoBtn = document.getElementById('upgrade-auto');
        const scoreEl = document.getElementById('score');
        const clickCostEl = document.getElementById('click-cost');
        const autoCostEl = document.getElementById('auto-cost');
        const clickPowerEl = document.getElementById('click-power');
        const autoPowerEl = document.getElementById('auto-power');

        // Theme Selections
        const themeAutoBtn = document.getElementById('theme-auto-btn');
        const themeDarkBtn = document.getElementById('theme-dark-btn');
        const themeLightBtn = document.getElementById('theme-light-btn');

        // ==========================================================================
        // SYSTEM ACCOUNT STORAGE ROUTINES
        // ==========================================================================
        function saveGame() {
            const gameData = {
                score: score,
                clickPower: clickPower,
                autoClickers: autoClickers,
                clickUpgradeCost: clickUpgradeCost,
                autoUpgradeCost: autoUpgradeCost,
                theme: currentThemeSetting,
                email: accountEmailInput.value,
                password: accountPassInput.value
            };
            localStorage.setItem('gq_profile_' + currentAccount, JSON.stringify(gameData));
            localStorage.setItem('gq_last_active_user', currentAccount);
        }

        function loadGame(targetUser) {
            currentAccount = targetUser || localStorage.getItem('gq_last_active_user') || 'Guest';
            menuAccountDisplay.textContent = currentAccount;
            accountNameInput.value = currentAccount === 'Guest' ? '' : currentAccount;

            const savedData = localStorage.getItem('gq_profile_' + currentAccount);
            if (savedData) {
                const data = JSON.parse(savedData);
                score = data.score ?? 0;
                clickPower = data.clickPower ?? 1;
                autoClickers = data.autoClickers ?? 0;
                clickUpgradeCost = data.clickUpgradeCost ?? 10;
                autoUpgradeCost = data.autoUpgradeCost ?? 50;
                currentThemeSetting = data.theme ?? 'auto';
                accountEmailInput.value = data.email ?? '';
                accountPassInput.value = data.password ?? '';
            } else {
                score = 0; clickPower = 1; autoClickers = 0;
                clickUpgradeCost = 10; autoUpgradeCost = 50;
                currentThemeSetting = 'auto';
                if(currentAccount === 'Guest') {
                    accountEmailInput.value = '';
                    accountPassInput.value = '';
                }
            }
            applyTheme(currentThemeSetting);
            updateUI();
        }

        // Generate Random Password String Function
        randomPassBtn.addEventListener('click', () => {
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$";
            let pass = "";
            for (let i = 0; i < 8; i++) {
                pass += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            accountPassInput.value = pass;
        });

        // Toggle Password Visibility Engine
        togglePassBtn.addEventListener('click', () => {
            if (accountPassInput.type === "password") {
                accountPassInput.type = "text";
                togglePassBtn.textContent = "🙈";
            } else {
                accountPassInput.type = "password";
                togglePassBtn.textContent = "👁️";
            }
        });

        // ==========================================================================
        // ROUTING SYSTEM
        // ==========================================================================
        playBtn.addEventListener('click', () => {
            menuView.classList.remove('active');
            gameView.classList.add('active');
            gameTitle.textContent = "Mining Zone";
        });

        backToMenuBtn.addEventListener('click', () => {
            gameView.classList.remove('active');
            menuView.classList.add('active');
            gameTitle.textContent = "Gold Quest";
        });

        openSettingsBtn.addEventListener('click', () => { settingsModal.classList.add('active'); });
        closeSettingsBtn.addEventListener('click', () => { settingsModal.classList.remove('active'); });

        goThemeViewBtn.addEventListener('click', () => {
            settingsModal.classList.remove('active');
            themeView.classList.add('active');
            gameTitle.textContent = "Select Theme";
        });

        goAccountViewBtn.addEventListener('click', () => {
            settingsModal.classList.remove('active');
            accountView.classList.add('active');
            accountError.textContent = "";
            accountPassInput.type = "password"; // Reset type back to password securely on open
            togglePassBtn.textContent = "👁️";
            gameTitle.textContent = "Account Config";
        });

        function returnToSettingsFromFrame(currentFrame) {
            currentFrame.classList.remove('active');
            menuView.classList.add('active');
            settingsModal.classList.add('active');
            gameTitle.textContent = "Gold Quest";
        }

        backToSettingsThemeBtn.addEventListener('click', () => returnToSettingsFromFrame(themeView));
        backToSettingsAccBtn.addEventListener('click', () => returnToSettingsFromFrame(accountView));

        // Form Validation & Switching Trigger
        saveAccountBtn.addEventListener('click', () => {
            const cleanName = accountNameInput.value.trim().replace(/[^a-zA-Z0-9 ]/g, "");
            const emailValue = accountEmailInput.value.trim().toLowerCase();
            const passValue = accountPassInput.value;

            if (cleanName.length < 2) {
                accountError.textContent = "Profile Name must be at least 2 characters!";
                return;
            }

            // Email domain confirmation checking criteria
            const allowedDomains = ["@gmail.com", "@outlook.com", "@hotmail.com", "@yahoo.com"];
            const isValidDomain = allowedDomains.some(domain => emailValue.endsWith(domain));

            if (!isValidDomain) {
                accountError.textContent = "Requires a valid Gmail, Outlook, Hotmail or Yahoo email!";
                return;
            }

            if (passValue.length < 4) {
                accountError.textContent = "Password must be at least 4 characters long!";
                return;
            }
            
            // Success switching profiles
            loadGame(cleanName);
            saveGame();
            
            accountView.classList.remove('active');
            menuView.classList.add('active');
            settingsModal.classList.add('active');
            gameTitle.textContent = "Gold Quest";
        });

        // ==========================================================================
        // THEME ENGINE IMPLEMENTATION
        // ==========================================================================
        function applyTheme(mode) {
            currentThemeSetting = mode;
            if (mode === 'auto') {
                document.documentElement.removeAttribute('data-theme');
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                }
            } else {
                document.documentElement.setAttribute('data-theme', mode);
            }
            saveGame();
        }

        themeAutoBtn.addEventListener('click', () => applyTheme('auto'));
        themeDarkBtn.addEventListener('click', () => applyTheme('dark'));
        themeLightBtn.addEventListener('click', () => applyTheme('light'));

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if(currentThemeSetting === 'auto') applyTheme('auto');
        });

        // ==========================================================================
        // GAMEPLAY ENGINE PROCEDURES
        // ==========================================================================
        resetBtn.addEventListener('click', () => {
            if(confirm(`Reset data for active profile "${currentAccount}"?`)) {
                localStorage.removeItem('gq_profile_' + currentAccount);
                loadGame(currentAccount);
                settingsModal.classList.remove('active');
            }
        });

        function updateUI() {
            scoreEl.textContent = Math.floor(score);
            clickPowerEl.textContent = clickPower;
            autoPowerEl.textContent = autoClickers;
            clickCostEl.textContent = clickUpgradeCost + " Gold";
            autoCostEl.textContent = autoUpgradeCost + " Gold";

            upgradeClickBtn.disabled = score < clickUpgradeCost;
            upgradeAutoBtn.disabled = score < autoUpgradeCost;
        }

        clickBtn.addEventListener('click', () => {
            score += clickPower;
            updateUI();
            saveGame();
        });

        upgradeClickBtn.addEventListener('click', () => {
            if (score >= clickUpgradeCost) {
                score -= clickUpgradeCost;
                clickPower += 1;
                clickUpgradeCost = Math.floor(clickUpgradeCost * 1.5);
                updateUI();
                saveGame();
            }
        });

        upgradeAutoBtn.addEventListener('click', () => {
            if (score >= autoUpgradeCost) {
                score -= autoUpgradeCost;
                autoClickers += 1;
                autoUpgradeCost = Math.floor(autoUpgradeCost * 1.5);
                updateUI();
                saveGame();
            }
        });

        let saveIntervalCount = 0;
        setInterval(() => {
            if (autoClickers > 0) {
                score += autoClickers;
                updateUI();
            }
            saveIntervalCount++;
            if (saveIntervalCount >= 5) {
                saveGame();
                saveIntervalCount = 0;
            }
        }, 1000);

        // Initialization load
        loadGame();
    </script>
</body>
</html>
